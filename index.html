<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>GeroDB — База Геропротекторов</title>
    <meta name="author" content="GeroDB Creator">
    <meta content="Отображение базы геропротекторных экстрактов из CSV">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.19/css/dataTables.bootstrap4.min.css">
    
    <style>
      body { padding-top: 50px; background-color: #f4f7f6; }
      h1 { margin-bottom: 30px; font-weight: bold; color: #2c3e50; text-align: center; }
      footer { margin-top: 50px; color: #7f8c8d; }
    </style>
  </head>

  <body>
    <div class="container-fluid">
      <main class="row">
        <div class="col">
          <h1>🧬 База геропротекторных экстрактов</h1>
          
          <div id="table-container"></div>
        </div>
      </main>
      
      <footer class="row">
        <div class="col text-center">
          <hr>
          <p>Данные подтянуты локально из <strong>data/bsvv.csv</strong></p>
        </div>
      </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.2.1/js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery.csv.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap4.min.js"></script>
    <script src="js/csv_to_html_table.js"></script>

    <script>
      // Инициализация по инструкции из README
      CsvToHtmlTable.init({
        csv_path: 'data/bsvv.csv', 
        element: 'table-container', 
        allow_download: true,
        csv_options: {
          separator: ';', 
          delimiter: '"'
        },
        datatables_options: {
          "paging": false,
          "language": {
            "search": "Поиск по таблице:",
            "info": "Всего записей: _TOTAL_"
          }
        }
      });
    </script>
  </body>
</html>
