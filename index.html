<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>GeroLab — Интеллектуальная база</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.19/css/dataTables.bootstrap4.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .header-bg { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 20px; }
        .nav-pills .nav-link.active { background-color: #007bff; }
        .tab-content { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 500px; }
        /* Стили чата */
        #chat-window { position: fixed; bottom: 80px; right: 20px; width: 350px; height: 450px; background: white; border: 1px solid #ddd; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .ai-btn { position: fixed; bottom: 15px; right: 20px; width: 60px; height: 60px; border-radius: 50%; border: none; background: #007bff; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,123,255,0.4); cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

<div class="header-bg text-center">
    <h1>🧬 GeroProtector Lab</h1>
    <p>Интеллектуальный реестр геропротекторных экстрактов</p>
</div>

<div class="container-fluid px-5">
    <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
        <li class="nav-item"><a class="nav-link active" id="db-tab" data-toggle="pill" href="#db-pane">База данных</a></li>
        <li class="nav-item"><a class="nav-link" id="about-tab" data-toggle="pill" href="#about-pane">О лаборатории</a></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="db-pane"><div id="table-container"></div></div>
        <div class="tab-pane fade" id="about-pane">
            <h3>Лаборатория геропротекторных технологий</h3>
            <p>Работа ведется в рамках Госзадания № ФГЗ-2026-0042.</p>
        </div>
    </div>
</div>

<button class="ai-btn" onclick="toggleChat()">🤖</button>
<div id="chat-window">
    <div style="background:#007bff; color:white; padding:10px; border-radius:15px 15px 0 0;">GeroLab AI Assistant</div>
    <div id="chat-messages"></div>
    <div class="p-2 border-top">
        <input type="text" id="user-input" class="form-control mb-1" placeholder="Ваш вопрос...">
        <button onclick="askAI()" class="btn btn-primary btn-sm btn-block">Спросить ИИ</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.2.1/js/bootstrap.bundle.min.js"></script>
<script src="js/jquery.csv.min.js"></script>
<script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap4.min.js"></script>
<script src="js/csv_to_html_table.js"></script>

<script>
    // 1. Настройка таблицы
    CsvToHtmlTable.init({
        csv_path: 'data/bsvv.csv',
        element: 'table-container',
        allow_download: true,
        csv_options: { separator: ';', delimiter: '"' },
        datatables_options: { "paging": false },
        custom_formatting: [[6, function(l){ return l ? `<a href="${l}" target="_blank" class="btn btn-sm btn-outline-primary">PubMed</a>` : '' }]]
    });

    // 2. Логика ИИ-чата
    function toggleChat() { $('#chat-window').toggle(); }

    async function askAI() {
        const input = $('#user-input');
        const box = $('#chat-messages');
        const text = input.val();
        if(!text) return;

        box.append(`<div><b>Вы:</b> ${text}</div>`);
        input.val('');

        // СЮДА ВСТАВЬ СВОЮ ССЫЛКУ ИЗ NGROK
        const NGROK_URL = "https://malcolm-cenobitic-finally.ngrok-free.dev/v1/chat/completions";

        try {
            const res = await fetch(NGROK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Ты научный ассистент лаборатории. Отвечай кратко на основе таблицы геропротекторов." },
                        { role: "user", content: text }
                    ]
                })
            });
            const data = await res.json();
            box.append(`<div class="text-primary"><b>ИИ:</b> ${data.choices[0].message.content}</div>`);
        } catch(e) {
            box.append(`<div class="text-danger">Ошибка: ИИ не в сети.</div>`);
        }
        box.scrollTop(box[0].scrollHeight);
    }
</script>
</body>
</html>
