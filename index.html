<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeroProtector Lab - Интеллектуальный реестр</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header { background: #fff; padding: 20px; border-bottom: 1px solid #dee2e6; text-align: center; margin-bottom: 30px; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 100px; }
        
        /* Стили чат-бота */
        #ai-widget {
            position: fixed; bottom: 20px; right: 20px; width: 350px;
            background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; z-index: 1000; overflow: hidden;
        }
        #chat-header { background: #007bff; color: white; padding: 12px; font-weight: bold; cursor: pointer; }
        #chat-messages { height: 300px; overflow-y: auto; padding: 15px; font-size: 14px; border-bottom: 1px solid #eee; }
        #chat-input-area { padding: 10px; display: flex; gap: 5px; }
        .ai-msg { color: #0056b3; background: #eef6ff; padding: 8px; border-radius: 10px; margin-bottom: 10px; }
        .user-msg { color: #333; background: #f1f1f1; padding: 8px; border-radius: 10px; margin-bottom: 10px; text-align: right; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://img.icons8.com/fluency/48/dna-helix.png" alt="logo">
    <h1 class="h3 mt-2">GeroProtector Lab</h1>
    <p class="text-muted">Интеллектуальный реестр генопротекторных экстрактов</p>
</div>

<div class="container">
    <div class="table-container">
        <h4 class="mb-3">База данных веществ</h4>
        <div id="table-output" class="table-responsive">
            <p class="text-center">Загрузка данных из CSV...</p>
        </div>
    </div>
</div>

<div id="ai-widget">
    <div id="chat-header">GeroLab AI Assistant</div>
    <div id="chat-messages">
        <div class="ai-msg">Привет! Спроси меня о дозировке или механизме любого вещества из таблицы.</div>
    </div>
    <div id="chat-input-area">
        <input type="text" id="user-input" class="form-control" placeholder="Ваш вопрос..." onkeypress="if(event.keyCode==13) askAI()">
        <button class="btn btn-primary" onclick="askAI()">Спросить</button>
    </div>
</div>

<script>
    // --- 1. ЗАГРУЗКА И ОТРИСОВКА CSV ---
    const csvUrl = 'data/bsvv.csv'; // Путь к твоему файлу на GitHub

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            let html = '<table class="table table-hover" id="main-table"><thead><tr>';
            // Заголовки
            Object.keys(results.data[0]).forEach(key => {
                html += `<th>${key}</th>`;
            });
            html += '</tr></thead><tbody>';
            // Строки
            results.data.forEach(row => {
                if(row[Object.keys(row)[0]]) { // Проверка на пустую строку
                    html += '<tr>';
                    Object.values(row).forEach(val => {
                        html += `<td>${val}</td>`;
                    });
                    html += '</tr>';
                }
            });
            html += '</tbody></table>';
            $('#table-output').html(html);
        }
    });

    // --- 2. ИНТЕЛЛЕКТУАЛЬНЫЙ ЧАТ (RAG НА СТОРОНЕ КЛИЕНТА) ---
    async function askAI() {
        const input = $('#user-input');
        const box = $('#chat-messages');
        const query = input.val().trim();
        if (!query) return;

        // Отображаем сообщение пользователя
        box.append(`<div class="user-msg"><b>Вы:</b> ${query}</div>`);
        input.val('');
        box.scrollTop(box[0].scrollHeight);

        // Поиск контекста в отрисованной таблице
        let foundContext = "";
        $('#main-table tbody tr').each(function() {
            const row = $(this);
            const name = row.find('td:eq(1)').text(); // Колонка Название
            const mechanism = row.find('td:eq(4)').text(); // Колонка Механизм
            const dosage = row.find('td:eq(5)').text(); // Колонка Дозировка
            
            if (name && query.toLowerCase().includes(name.toLowerCase())) {
                foundContext = `Вещество: ${name}, Механизм: ${mechanism}, Дозировка: ${dosage}`;
                return false; // Нашли - выходим из цикла
            }
        });

        // URL твоего запущенного ngrok (НЕ ЗАБЫВАЙ ОБНОВЛЯТЬ ЕГО ТУТ ПРИ ПЕРЕЗАПУСКЕ)
        const NGROK_URL = "https://malcolm-cenobitic-finally.ngrok-free.dev/v1/chat/completions";

        try {
            const res = await fetch(NGROK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { 
                            role: "system", 
                            content: "Ты научный ассистент GeroLab. Твои знания: " + (foundContext || "информации нет в таблице") + ". Отвечай кратко по этим данным. Если данных нет, скажи что препарата нет в реестре." 
                        },
                        { role: "user", content: query }
                    ],
                    temperature: 0.2
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            box.append(`<div class="ai-msg"><b>ИИ:</b> ${reply}</div>`);
        } catch (e) {
            box.append(`<div class="text-danger small">Ошибка: Проверь ngrok и LM Studio (CORS должен быть включен).</div>`);
        }
        box.scrollTop(box[0].scrollHeight);
    }
</script>

</body>
</html>
