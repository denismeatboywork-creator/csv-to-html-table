<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>GeroDB — База Геропротекторов</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.19/css/dataTables.bootstrap4.min.css">
</head>
<body class="bg-light">

    <div class="container-fluid py-5">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-5">🧬 База геропротекторных экстрактов</h1>
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div id="table-container" class="table-responsive"></div>
                    </div>
                </div>

                <div class="text-center mt-4 text-muted">
                    <small>Данные загружены из локальной базы: <strong>data/bsvv.csv</strong></small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.2.1/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/jquery.csv.min.js"></script>
    
    <script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap4.min.js"></script>
    
    <script src="js/csv_to_html_table.js"></script>

    <script>
        // Запуск процесса создания таблицы
        CsvToHtmlTable.init({
            csv_path: "data/bsvv.csv",
            element: "#table-container", 
            allow_download: true,
            csv_options: {
                separator: ";", // ЕСЛИ ТАБЛИЦА НЕ ПОЯВИТСЯ — ЗАМЕНИ ЗАПЯТУЮ НА ТОЧКУ С ЗАПЯТОЙ ";"
                delimiter: '"'
            },
            datatables_options: {
                "paging": false,
                "language": {
                    "search": "Поиск:",
                    "zeroRecords": "Ничего не найдено"
                }
            }
        });
    </script>

</body>
</html>
